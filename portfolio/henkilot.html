<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Henkilötiedot</title>
    <script src="henkilot.js" defer></script>
            <link rel="icon" href="../aitisrakastaja.png" type="png">
<a href="index.html">Takaisin portfolioon</a>

</head>

<body>

<h1>Henkilötiedot</h1>

<table>
    <thead>
        <tr>
            <th>Nimi</th>
            <th>Ikä</th>
            <th>Työ</th>
            <th>Ajokortti</th>
        </tr>
    </thead>

    <tbody id="rivit">
        <!-- Tänne JS lisää rivit -->
    </tbody>
</table>

<h2>Lisää uusi henkilö</h2>

<form onsubmit="lisaaHenkilo(); return false;">
    <input id="nimi" type="text" placeholder="Nimi">
    <input id="ika" type="number" placeholder="Ikä">
    <input id="tyo" type="text" placeholder="Työ">

    <label>
        <input id="ajokortti" type="checkbox">
        Ajokortti
    </label>

    <button type="submit">Lähetä</button>
</form>

</body>
</html>
